name: tubes_hotel
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  google_sign_in: 6.2.1
  http: ^1.6.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  provider: ^6.1.5+1
  qr_flutter: ^4.1.0
  speech_to_text: ^7.0.0
  url_launcher: ^6.3.2
  dio: ^5.4.0                 
  path_provider: ^2.1.1
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/background.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png" # Pastikan path ini sesuai dengan lokasi gambar Anda
  min_sdk_android: 21 # Sesuaikan jika perlu
